server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "mpx.sovereign"
    data_dir = "/run/spire/data"
    log_level = "DEBUG"
    ca_key_type = "rsa-2048" # Initial bootstrap key
    ca_subject = {
        country = ["US"],
        organization = ["MadProjx"],
        common_name = "mpx.sovereign",
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/data/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/run/spire/data/keys.json"
        }
    }
}
